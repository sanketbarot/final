<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DecoStock</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="bg-particles"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>

<nav class="navbar" id="navbar">
  <div class="container"><div class="nav-inner">
    <a href="index.html" class="nav-logo"><i class="fas fa-crown"></i> Deco<span class="gold-text">Stock</span></a>
    <ul class="nav-menu" id="navMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="items.html">Items</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html" class="btn-nav-login active">Login</a></li>
      <li><a href="signup.html" class="btn-nav-signup">Sign Up</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
  </div></div>
</nav>

<div class="auth-page">
  <div class="auth-box glass-strong">
    <div class="auth-top"><i class="fas fa-crown"></i><h2>Welcome Back</h2><p>Login to your DecoStock account</p></div>
    <div id="loginAlert"></div>
    <form id="loginForm">
      <div class="form-group"><label>Email Address</label><div class="input-wrap"><i class="fas fa-envelope icon-left"></i><input type="email" id="loginEmail" placeholder="Enter email address" required></div></div>
      <div class="form-group"><label>Password</label><div class="input-wrap"><i class="fas fa-lock icon-left"></i><input type="password" id="loginPass" placeholder="Enter password" required><i class="fas fa-eye eye-icon" id="eyeIcon"></i></div></div>
      <div class="auth-options"><label class="remember-me"><input type="checkbox"><span>Remember me</span></label><a href="#" class="forgot-link">Forgot Password?</a></div>
      <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-sign-in-alt"></i> Login</button>
    </form>
    <div class="divider"><span>or</span></div>
    <div class="auth-footer"><p>Don't have an account? <a href="signup.html">Sign Up Free</a></p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/common.js"></script>
<script src="js/login.js"></script>
</body>
</html>
