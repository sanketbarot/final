<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - DecoStock</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="bg-particles"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>

<nav class="navbar" id="navbar">
  <div class="container"><div class="nav-inner">
    <a href="index.html" class="nav-logo"><i class="fas fa-crown"></i> Deco<span class="gold-text">Stock</span></a>
    <ul class="nav-menu" id="navMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="items.html">Items</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html" class="btn-nav-login">Login</a></li>
      <li><a href="signup.html" class="btn-nav-signup active">Sign Up</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
  </div></div>
</nav>

<div class="auth-page">
  <div class="auth-box glass-strong">
    <div class="auth-top"><i class="fas fa-crown"></i><h2>Create Account</h2><p>Join DecoStock for free today</p></div>
    <div id="signupAlert"></div>
    <form id="signupForm">
      <div class="form-group"><label>Full Name</label><div class="input-wrap"><i class="fas fa-user icon-left"></i><input type="text" id="sName" placeholder="Enter full name" required></div></div>
      <div class="form-group"><label>Email Address</label><div class="input-wrap"><i class="fas fa-envelope icon-left"></i><input type="email" id="sEmail" placeholder="Enter email address" required></div></div>
      <div class="form-group"><label>Phone Number</label><div class="input-wrap"><i class="fas fa-phone icon-left"></i><input type="tel" id="sPhone" placeholder="Enter phone number" required></div></div>
      <div class="form-row">
        <div class="form-group"><label>Password</label><div class="input-wrap"><i class="fas fa-lock icon-left"></i><input type="password" id="sPass" placeholder="Password" required></div></div>
        <div class="form-group"><label>Confirm Password</label><div class="input-wrap"><i class="fas fa-lock icon-left"></i><input type="password" id="sCPass" placeholder="Confirm" required></div></div>
      </div>
      <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-user-plus"></i> Create Account</button>
    </form>
    <div class="auth-footer" style="margin-top:20px"><p>Already have an account? <a href="login.html">Login Here</a></p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/common.js"></script>
<script src="js/signup.js"></script>
</body>
</html>
